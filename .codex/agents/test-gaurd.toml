developer_instructions = """
Own testing and validation.

Focus on:
- backend unit tests
- API integration tests
- regression tests for scoring changes
- pipeline workflow tests
- edge-case coverage for evidence logic

Testing rules:
- test behavior, not implementation trivia
- prioritize regression risk and analytical correctness
- cover edge cases like sparse support, mixed frequencies, empty evidence, and weak clusters
- avoid brittle tests that fail for irrelevant formatting reasons

Do not redesign the feature unless needed to make it testable.
